name: Retrieval Quality

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Embedding provider to evaluate"
        required: true
        default: "mock"
        type: choice
        options:
          - mock
          - openai-compatible
      min_hit_rate:
        description: "Minimum acceptable hit rate"
        required: true
        default: "1.0"
      run_qdrant:
        description: "Also run Qdrant end-to-end evaluation"
        required: true
        default: false
        type: boolean
      embedding_base_url:
        description: "OpenAI-compatible embedding base URL"
        required: false
        default: ""
      embedding_model:
        description: "Embedding model name"
        required: false
        default: ""
      embedding_dimension:
        description: "Embedding vector dimension"
        required: false
        default: "384"

jobs:
  retrieval-quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      EMBEDDING_PROVIDER: ${{ inputs.provider }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_BASE_URL: ${{ inputs.embedding_base_url }}
      EMBEDDING_MODEL: ${{ inputs.embedding_model }}
      EMBEDDING_DIMENSION: ${{ inputs.embedding_dimension }}
      QDRANT_URL: "http://127.0.0.1:6333"
      QDRANT_COLLECTION: "personal_ai_os_quality_eval"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Validate real provider secret
        run: |
          if [ "${{ inputs.provider }}" = "openai-compatible" ] && [ -z "${EMBEDDING_API_KEY}" ]; then
            echo "EMBEDDING_API_KEY repository secret is required for openai-compatible provider" >&2
            exit 1
          fi

      - name: Run retrieval quality
        run: python scripts/evaluate_retrieval_quality.py --min-hit-rate "${{ inputs.min_hit_rate }}" --json

      - name: Start Qdrant
        if: ${{ inputs.run_qdrant }}
        run: docker compose up -d qdrant

      - name: Run Qdrant retrieval quality
        if: ${{ inputs.run_qdrant }}
        run: python scripts/evaluate_qdrant_retrieval_quality.py --min-hit-rate "${{ inputs.min_hit_rate }}" --json

      - name: Stop Qdrant
        if: ${{ always() && inputs.run_qdrant }}
        run: docker compose down
