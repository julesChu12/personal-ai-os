services:
  api:
    build: .
    container_name: personal-ai-os-api
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/personal_ai_os
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=personal_ai_os_memories
      - OBSIDIAN_VAULT_PATH=/data/obsidian
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-MiniMax-M2.7-highspeed}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-EMPTY}
      - OPENAI_COMPAT_API_KEYS=${OPENAI_COMPAT_API_KEYS:-}
      - PROVIDER_TIMEOUT_SECONDS=${PROVIDER_TIMEOUT_SECONDS:-120}
      - PROVIDER_RETRY_ATTEMPTS=${PROVIDER_RETRY_ATTEMPTS:-1}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-mock}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
    ports:
      - "8000:8000"
    volumes:
      - ./data/obsidian:/data/obsidian
      - ./:/app
    depends_on:
      - postgres
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16
    container_name: personal-ai-os-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_ai_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: personal-ai-os-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_COMPAT_BASE_URL:-http://host.docker.internal:8000/v1}
      - OPENAI_API_KEY=${OPENAI_COMPAT_API_KEY:-EMPTY}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  open_webui_data:
